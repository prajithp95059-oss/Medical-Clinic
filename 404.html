<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Stackly Medical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Fraunces:ital,opsz,wght@1,9..144,400..600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* ════════════════════════════════════
   TOKENS — match site exactly
════════════════════════════════════ */
:root{
  --ink:     #0D2B2A;
  --teal:    #1F8A74;
  --coral:   #EF6355;
  --cream:   #F7F3EC;
  --sand:    #E8E1D3;
  --slate:   #4A5D5B;
  --white:   #FFFFFF;
  --display: 'Fraunces', serif;
  --body:    'Inter', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}

/* ════════════════════════════════════
   RESET
════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;height:100%;}
body{
  font-family:var(--body);
  background:var(--ink);
  color:var(--cream);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
h1,h2,h3{font-family:var(--display);font-weight:500;line-height:1.05;}
img{max-width:100%;display:block;}

/* ════════════════════════════════════
   MAIN 404 CONTENT
════════════════════════════════════ */
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 80px;position:relative;overflow:hidden;}

/* Background animated pulse rings */
.pulse-bg{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:0;
}
.pulse-ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;border:1px solid rgba(31,138,116,.18);
  transform:translate(-50%,-50%) scale(0);
  animation:ringExpand 3.6s ease-out infinite;
}
.pulse-ring:nth-child(1){width:240px;height:240px;animation-delay:0s;}
.pulse-ring:nth-child(2){width:400px;height:400px;animation-delay:.9s;}
.pulse-ring:nth-child(3){width:580px;height:580px;animation-delay:1.8s;}
.pulse-ring:nth-child(4){width:760px;height:760px;animation-delay:2.7s;}
@keyframes ringExpand{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.6;}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* ECG / heartbeat line decoration */
.ecg-wrap{
  position:absolute;bottom:0;left:0;right:0;
  height:80px;overflow:hidden;pointer-events:none;z-index:0;opacity:.18;
}
.ecg-line{
  position:absolute;bottom:20px;left:-100%;
  width:300%;height:2px;
}
.ecg-line svg{width:100%;height:60px;display:block;}
.ecg-path{
  fill:none;stroke:var(--coral);stroke-width:2;stroke-linecap:round;
  stroke-dasharray:900;stroke-dashoffset:900;
  animation:drawECG 3s linear infinite;
}
@keyframes drawECG{
  0%{stroke-dashoffset:900;}
  100%{stroke-dashoffset:-900;}
}

/* Content card */
.card-404{
  position:relative;z-index:1;
  background:rgba(247,243,236,.05);
  border:1px solid rgba(232,225,211,.1);
  border-radius:24px;
  padding:64px 56px 52px;
  text-align:center;
  max-width:640px;
  width:100%;
  backdrop-filter:blur(8px);
  opacity:0; /* gsap will reveal */
}

/* Big 404 number */
.num-404{
  display:flex;align-items:center;justify-content:center;gap:0;
  margin-bottom:32px;
  line-height:1;
}
.digit{
  font-family:var(--display);
  font-size:clamp(6rem,18vw,11rem);
  font-weight:600;
  color:var(--cream);
  display:inline-block;
  opacity:0; /* gsap */
}
.digit.mid{color:var(--coral);position:relative;}

/* Heartbeat icon inside the 0 */
.heart-in-zero{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:clamp(44px,9vw,72px);
  height:clamp(44px,9vw,72px);
  animation:heartbeat 1.4s ease-in-out infinite;
  opacity:0; /* gsap */
}
@keyframes heartbeat{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  20%{transform:translate(-50%,-50%) scale(1.15);}
  36%{transform:translate(-50%,-50%) scale(.96);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  66%{transform:translate(-50%,-50%) scale(1);}
}

/* Eyebrow / tag */
.eyebrow-404{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--coral);
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:18px;opacity:0; /* gsap */
}
.eyebrow-404::before,.eyebrow-404::after{
  content:'';flex:1;max-width:36px;height:1px;background:var(--coral);
}

/* Headline */
.headline-404{
  font-family:var(--display);
  font-size:clamp(1.5rem,4.5vw,2.4rem);
  font-weight:500;
  color:var(--cream);
  margin-bottom:14px;
  opacity:0; /* gsap */
}
.headline-404 em{font-style:italic;color:var(--coral);}

/* Sub text */
.sub-404{
  font-size:.97rem;
  color:rgba(232,225,211,.65);
  line-height:1.7;
  max-width:420px;
  margin:0 auto 36px;
  opacity:0; /* gsap */
}

/* Buttons row */
.btns-404{
  display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  opacity:0; /* gsap */
}
.btn-404-home{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:100px;
  background:var(--coral);color:#fff;
  font-size:.9rem;font-weight:600;
  transition:transform .3s,box-shadow .3s;
}
.btn-404-home:hover{transform:translateY(-4px);box-shadow:0 18px 36px -12px rgba(239,99,85,.6);}
.btn-404-home svg{width:16px;height:16px;flex-shrink:0;}

.btn-404-back{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:100px;
  border:1.5px solid rgba(232,225,211,.35);color:var(--cream);
  font-size:.9rem;font-weight:600;
  transition:border-color .3s,background .3s,transform .3s;
}
.btn-404-back:hover{
  border-color:var(--cream);
  background:rgba(232,225,211,.08);
  transform:translateY(-4px);
}
.btn-404-back svg{width:16px;height:16px;flex-shrink:0;}

/* ════════════════════════════════════
   FOOTER
════════════════════════════════════ */
footer{
  text-align:center;padding:22px 24px;
  border-top:1px solid rgba(232,225,211,.08);
  font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;
  color:rgba(232,225,211,.3);
}

/* ════════════════════════════════════
   FLOATING PARTICLES
════════════════════════════════════ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;
  animation:floatUp linear infinite;
  opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:.5;}
  90%{opacity:.2;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */
@media(max-width:900px){
  header{padding:16px 24px;}
  nav.links,.nav-actions .btn{display:none;}
  
  .card-404{padding:48px 32px 40px;}
}
@media(max-width:600px){
  header{padding:14px 18px;}
  .card-404{padding:36px 20px 32px;}
  .btns-404{flex-direction:column;align-items:center;}
  .btn-404-home,.btn-404-back{width:100%;max-width:280px;justify-content:center;}
  main{padding:40px 14px 60px;}
}
@media(max-width:400px){
  header{padding:12px 14px;}
  .card-404{padding:28px 14px 26px;}
}
</style>
</head>
<body>

</div>

<!-- Floating particles (decorative) -->
<div class="particles" id="particles"></div>

<!-- ══ MAIN ══ -->
<main>

  <!-- Animated pulse rings -->
  <div class="pulse-bg">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
  </div>

  <!-- ECG line at bottom -->
  <div class="ecg-wrap">
    <div class="ecg-line">
      <svg viewBox="0 0 900 60" preserveAspectRatio="none">
        <path class="ecg-path"
          d="M0,30 L80,30 L100,30 L110,10 L120,50 L130,5 L145,55 L158,30 L240,30 L260,30 L270,10 L280,50 L290,5 L305,55 L318,30 L400,30 L420,30 L430,10 L440,50 L450,5 L465,55 L478,30 L560,30 L580,30 L590,10 L600,50 L610,5 L625,55 L638,30 L720,30 L740,30 L750,10 L760,50 L770,5 L785,55 L798,30 L900,30"/>
      </svg>
    </div>
  </div>

  <!-- Main card -->
  <div class="card-404" id="card">

    <div class="eyebrow-404" id="eyebrow">Error 404</div>

    <!-- 4 · 0(heart) · 4 -->
    <div class="num-404">
      <span class="digit" id="d1">4</span>
      <span class="digit mid" id="d2">
        0
        <svg class="heart-in-zero" id="heart" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 40S8 28 8 18C8 13.6 11.6 10 16 10C18.8 10 21.3 11.4 23 13.6C24 12.5 25.3 11.6 26.8 11.1L30 9L31 14H36L34 19L38 20L34 24L36 30L30 28L27 34L24 40Z" fill="none" stroke="var(--coral)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 18C8 13.6 11.6 10 16 10C18.8 10 21.3 11.4 23 13.6C24.7 11.4 27.2 10 32 10C36.4 10 40 13.6 40 18C40 28 24 40 24 40C24 40 8 28 8 18Z" fill="var(--coral)" opacity=".18"/>
          <path d="M8 18C8 13.6 11.6 10 16 10C18.8 10 21.3 11.4 23 13.6C24.7 11.4 27.2 10 32 10C36.4 10 40 13.6 40 18C40 28 24 40 24 40C24 40 8 28 8 18Z" fill="none" stroke="var(--coral)" stroke-width="2.2" stroke-linejoin="round"/>
          <!-- Pulse line inside heart -->
          <path d="M13 20 L17 20 L19 16 L21 24 L23 18 L25 22 L27 20 L35 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
        </svg>
      </span>
      <span class="digit" id="d3">4</span>
    </div>

    <h1 class="headline-404" id="hl">
      Page <em>not found</em>
    </h1>

    <p class="sub-404" id="sub">
      The page you're looking for has moved, been removed, or may have never existed.
      Don't worry — we'll help you find your way back to care.
    </p>

    <div class="btns-404" id="btns">
      <a href="index.html" class="btn-404-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9Z"/>
        </svg>
        Back to Home
      </a>
      <button class="btn-404-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Go Back
      </button>
    </div>

    </div><!-- /card -->

</main>

<!-- ══ FOOTER ══ -->
<footer>
  © 2026 Stackly Medical · All rights reserved
</footer>

<!-- ══ SCRIPTS ══ -->
<script>
/* ── Go back ── */
function goBack(){
  if(window.history.length > 1){ window.history.back(); }
  else { window.location.href = 'index.html'; }
}

/* ── Floating particles ── */
(function(){
  var container = document.getElementById('particles');
  var colors = ['rgba(31,138,116,.3)','rgba(239,99,85,.25)','rgba(232,225,211,.15)'];
  for(var i = 0; i < 22; i++){
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 6 + 3;
    p.style.cssText = [
      'width:'+size+'px',
      'height:'+size+'px',
      'left:'+(Math.random()*100)+'%',
      'background:'+colors[Math.floor(Math.random()*colors.length)],
      'animation-duration:'+(Math.random()*14+10)+'s',
      'animation-delay:'+-(Math.random()*16)+'s'
    ].join(';');
    container.appendChild(p);
  }
})();

/* ── GSAP entrance animations ── */
(function(){
  /* card container */
  gsap.to('#card', {
    opacity:1, y:0,
    duration:.8, ease:'power3.out', delay:.1,
    from:{y:40}
  });

  /* eyebrow */
  gsap.to('#eyebrow', { opacity:1, y:0, duration:.6, ease:'power3.out', delay:.25, from:{y:16} });

  /* digits stagger */
  gsap.fromTo(['#d1','#d2','#d3'],
    { opacity:0, y:60, rotationX:-20 },
    { opacity:1, y:0, rotationX:0, duration:.9, ease:'back.out(1.4)', stagger:.12, delay:.3 }
  );

  /* heart inside zero */
  gsap.to('#heart', { opacity:1, scale:1, duration:.5, ease:'back.out(2)', delay:.82, from:{scale:.4} });

  /* headline */
  gsap.to('#hl', { opacity:1, y:0, duration:.7, ease:'power3.out', delay:.72, from:{y:24} });

  /* sub text */
  gsap.to('#sub', { opacity:1, y:0, duration:.65, ease:'power3.out', delay:.86, from:{y:20} });

  /* buttons */
  gsap.to('#btns', { opacity:1, y:0, duration:.6, ease:'power3.out', delay:1.0, from:{y:18} });

  /* continuous gentle float on card */
  gsap.to('#card', {
    y:-8, duration:3.5, ease:'sine.inOut',
    yoyo:true, repeat:-1, delay:1.6
  });

  /* digit glow pulse */
  gsap.to('#d2', {
    textShadow:'0 0 40px rgba(239,99,85,.6)',
    duration:1.4, ease:'sine.inOut',
    yoyo:true, repeat:-1, delay:1.2
  });
})();
</script>
</body>
</html>
